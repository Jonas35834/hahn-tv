<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hahn.tv Platform</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

#app { display:none; }

#player {
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>📺 Hahn.tv</h1>

<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>
    <input id="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">
    <br>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

    <h2>Live Stream</h2>
    <div id="player"></div>

    <div id="viewer">👀 Zuschauer: 0</div>

    <button onclick="logout()">Logout</button>

    <!-- ADMIN -->
    <div id="admin" style="display:none; margin-top:40px;">
        <h2>👨‍💼 Admin Panel</h2>

        <h3>User verwalten</h3>
        <div id="userList"></div>

        <h3>🎥 Stream ändern</h3>
        <input id="freeStream" placeholder="Free Stream URL">
        <input id="premiumStream" placeholder="Premium Stream URL">
        <button onclick="updateStream()">Speichern</button>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    onSnapshot,
    collection,
    getDocs,
    increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {

  apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",

  authDomain: "ohg-tv.firebaseapp.com",

  projectId: "ohg-tv",

  storageBucket: "ohg-tv.firebasestorage.app",

  messagingSenderId: "700588840705",

  appId: "1:700588840705:web:cb7d3f18f8bba3512d2d00"

};



const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* DEVICE */
function getDeviceId() {
    let id = localStorage.getItem("deviceId");
    if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("deviceId", id);
    }
    return id;
}

/* LOGIN */
window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password);
};

/* LOGOUT */
window.logout = function() {
    signOut(auth);
};

/* STREAM LADEN */
function loadStream(plan) {
    const ref = doc(db, "config", "stream");

    onSnapshot(ref, (snap) => {
        const data = snap.data();

        let url = data?.free;

        if (plan === "premium") {
            url = data?.premium;
        }

        document.getElementById("player").innerHTML = `
            <iframe width="560" height="315"
            src="${url}"
            frameborder="0" allowfullscreen></iframe>
        `;
    });
}

/* SESSION + ABO + DEVICE LOCK */
async function handleUser(user) {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) return;

    const data = snap.data();

    // DEVICE LOCK
    const deviceId = getDeviceId();
    await setDoc(ref, {
        ...data,
        activeDevice: deviceId
    });

    if (data.activeDevice && data.activeDevice !== deviceId) {
        alert("❌ anderes Gerät aktiv");
        signOut(auth);
        return;
    }

    // STREAM
    loadStream(data.plan);

    // VIEWERS
    const vRef = doc(db, "stats", "viewers");
    await setDoc(vRef, { count: increment(1) }, { merge: true });

    onSnapshot(vRef, (snap) => {
        document.getElementById("viewer").innerText =
            "👀 Zuschauer: " + (snap.data()?.count || 0);
    });

    // ADMIN CHECK
    if (data.role === "admin") {
        document.getElementById("admin").style.display = "block";
        loadAdmin();
        loadStreamInputs();
    }

    // LIVE KICK
    onSnapshot(ref, (snap) => {
        const d = snap.data();
        if (d.activeDevice !== getDeviceId()) {
            alert("❌ ausgeloggt");
            signOut(auth);
        }
    });
}

/* ADMIN USER LIST */
async function loadAdmin() {
    const users = await getDocs(collection(db, "users"));

    const box = document.getElementById("userList");
    box.innerHTML = "";

    users.forEach(u => {
        const d = u.data();

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            ${d.email}<br>
            Plan: ${d.plan || "free"}<br>
            <button onclick="setPlan('${u.id}','premium')">Premium</button>
            <button onclick="setPlan('${u.id}','free')">Free</button>
        `;

        box.appendChild(div);
    });
}

/* PLAN ÄNDERN */
window.setPlan = async function(uid, plan) {
    await updateDoc(doc(db, "users", uid), { plan });
    loadAdmin();
};

/* STREAM UPDATE */
window.updateStream = async function() {
    await updateDoc(doc(db, "config", "stream"), {
        free: document.getElementById("freeStream").value,
        premium: document.getElementById("premiumStream").value
    });

    alert("Stream aktualisiert");
};

/* STREAM INPUTS LADEN */
async function loadStreamInputs() {
    const snap = await getDoc(doc(db, "config", "stream"));

    if (!snap.exists()) return;

    const d = snap.data();

    document.getElementById("freeStream").value = d.free || "";
    document.getElementById("premiumStream").value = d.premium || "";
}

/* AUTH */
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
        handleUser(user);
    } else {
        document.getElementById("login").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});

</script>

</body>
</html>
