<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OHG-TV</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <h1>📺 OHG-TV</h1>

    <div class="subtitle">
        Live • Schule • 24/7
    </div>

    <!-- PLAYER -->
    <div id="player"></div>

    <div id="viewer">👀 Zuschauer: 0</div>

    <!-- STATUS -->
    <div class="card">
        <p>💳 Plan: <span id="planText">-</span></p>
        <p>👨‍💼 Admin: <span id="adminText">-</span></p>
    </div>

    <!-- WERBUNG -->
    <div id="ad" class="card">
        <h3>⭐ Premium</h3>
        <p>Login erforderlich</p>

        <button onclick="document.getElementById('login').scrollIntoView({behavior:'smooth'})">
            Login
        </button>

        <a href="https://teams.microsoft.com" target="_blank">
            Teams Nachricht
        </a>
    </div>

    <!-- LOGIN -->
    <div id="login" class="card">

        <h2>Login</h2>

        <input id="email" placeholder="E-Mail">
        <input id="password" type="password" placeholder="Passwort">

        <button onclick="login()">Login</button>

    </div>

    <!-- ADMIN -->
    <div id="admin" class="card">

        <h2>Admin Panel</h2>

        <div id="userList"></div>

        <h3>Streams</h3>

        <input id="freeStream" placeholder="Free Stream">
        <input id="premiumStream" placeholder="Premium Stream">

        <button onclick="updateStream()">Speichern</button>

        <button onclick="logout()">Logout</button>

    </div>

</div>

<footer>
    <a href="#" onclick="openImpressum()">Impressum</a>
</footer>

<!-- IMPRESSUM -->
<div id="impressum">
    <div class="box">
        <h2>Impressum</h2>
        <p>
            OHG-TV<br>
            Schulprojekt<br><br>
            Jonas Hohl<br>
            kontakt@ohg-tv.de
        </p>

        <button onclick="closeImpressum()">Schließen</button>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",
  authDomain: "ohg-tv.firebaseapp.com",
  projectId: "ohg-tv",
  storageBucket: "ohg-tv.firebasestorage.app",
  messagingSenderId: "700588840705",
  appId: "1:700588840705:web:cb7d3f18f8bba3512d2d00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = function () {
    signInWithEmailAndPassword(
        auth,
        email.value,
        password.value
    ).catch(e => alert(e.message));
};

window.logout = () => signOut(auth);

// STREAM SYSTEM (WICHTIG)
function loadStream(user) {

    const ref = doc(db, "config", "stream");

    onSnapshot(ref, snap => {

        const data = snap.data();

        const url = user.plan === "premium"
            ? data.premium
            : data.free;

        render(url);
    });
}

// PLAYER
function render(url) {

    if (url.includes(".m3u8")) {

        player.innerHTML = `
        <video id="video" controls autoplay style="width:100%"></video>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"><\/script>
        `;

        setTimeout(() => {

            const video = document.getElementById("video");

            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);

        }, 100);

    } else {

        player.innerHTML = `
        <iframe src="${url}"
        style="width:100%;height:300px;border:0"></iframe>
        `;
    }
}

// USER
async function handleUser(user) {

    const ref = doc(db, "users", user.uid);

    let snap = await getDoc(ref);

    if (!snap.exists()) {
        await setDoc(ref, {
            email: user.email,
            plan: "free",
            role: "user"
        });
    }

    const data = (await getDoc(ref)).data();

    planText.innerText = data.plan;
    adminText.innerText = data.role === "admin" ? "Ja" : "Nein";

    loadStream(data);

    admin.style.display = data.role === "admin" ? "block" : "none";
}

// ADMIN
async function loadAdmin() {

    const users = await getDocs(collection(db, "users"));

    userList.innerHTML = "";

    users.forEach(u => {

        const d = u.data();

        const div = document.createElement("div");

        div.className = "card";

        div.innerHTML = `
        ${d.email}<br>
        ${d.plan}

        <button onclick="setPlan('${u.id}','premium')">Premium</button>
        <button onclick="setPlan('${u.id}','free')">Free</button>
        `;

        userList.appendChild(div);
    });
}

window.setPlan = async (id, plan) => {
    await updateDoc(doc(db,"users",id),{plan});
    loadAdmin();
};

window.updateStream = async () => {
    await updateDoc(doc(db,"config","stream"),{
        free: freeStream.value,
        premium: premiumStream.value
    });
    alert("gespeichert");
};

// AUTH
onAuthStateChanged(auth, user => {

    if (!user) {
        ad.style.display = "block";
        admin.style.display = "none";
        loadStream({plan:"free"});
        return;
    }

    ad.style.display = "none";
    handleUser(user);
});

// IMPRESSUM
window.openImpressum = () => impressum.style.display = "flex";
window.closeImpressum = () => impressum.style.display = "none";

</script>

</body>
</html>
