<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OHG-TV</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

#app{
    max-width:1000px;
    margin:auto;
    padding:15px;
}

h1{
    margin-top:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:16px;
    padding:15px;
    margin-top:15px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    box-sizing:border-box;
}

iframe,
video{
    width:100%;
    border:none;
    border-radius:18px;
    background:black;
}

#admin{
    display:none;
}

#status{
    margin-top:10px;
    opacity:0.8;
}

#loginRequired{
    margin-top:20px;
}

#viewer{
    margin-top:10px;
}

.userCard{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:12px;
    margin-top:10px;
}

.divider{
    margin:20px 0;
    opacity:0.6;
}

.error{
    color:#f87171;
    margin-top:10px;
}

.linkBtn{
    background:none;
    color:#93c5fd;
    text-decoration:underline;
    padding:5px;
}

footer{
    margin-top:40px;
    padding:20px;
    opacity:0.7;
}

</style>

</head>

<body>

<div id="app">

<h1>📺 OHG-TV</h1>

<p>
Schulfernsehen • Live • 24/7
</p>

<div style="text-align:center;">
<button onclick="openMediathek()" style="margin-top:20px;">
🎬 Mediathek öffnen
</button>
</div>

<!-- PLAYER -->
<div class="card">

<div id="player">

<div id="loginRequired">

<h2>
🔒 Login erforderlich
</h2>

<p>
Bitte mit dem Schul-Microsoftkonto oder per E-Mail anmelden.
</p>

<button onclick="microsoftLogin()">
Mit Microsoft anmelden
</button>

<div class="divider">— oder —</div>

<input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
<input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">

<button onclick="emailLogin()">
Mit E-Mail anmelden
</button>

<div id="authError" class="error"></div>

</div>

</div>

<div id="viewer">
👀 Zuschauer: 0
</div>

</div>

<!-- STATUS -->
<div class="card">

<div id="status">

<p>
💳 Plan:
<span id="planText">
-
</span>
</p>

<p>
👨‍💼 Admin:
<span id="adminText">
-
</span>
</p>

</div>

<button
id="logoutBtn"
style="display:none;"
onclick="logout()"
>
Logout
</button>

</div>

<!-- ADMIN -->
<div id="admin" class="card">

<h2>
👨‍💼 Adminpanel
</h2>

<h3>
🎥 Streams
</h3>

<input
id="freeStream"
placeholder="Free Stream URL"
>

<input
id="premiumStream"
placeholder="Premium Stream URL"
>

<button onclick="updateStream()">
Speichern
</button>

<h3>
👥 Benutzer
</h3>

<div class="userCard">

<b>➕ Neuen Nutzer anlegen</b>

<input id="newUserEmail" type="email" placeholder="E-Mail" autocomplete="off">
<input id="newUserPassword" type="password" placeholder="Passwort" autocomplete="new-password">

<select id="newUserPlan" style="width:100%;padding:12px;border-radius:12px;margin-top:10px;">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>

<button onclick="adminCreateUser()">
Nutzer anlegen
</button>

<div id="createUserStatus" class="error"></div>

</div>

<div id="userList"></div>

</div>

<footer>
OHG-TV
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script type="module">

(async () => {

try{

// FIREBASE IMPORTS
const {
initializeApp
} = await import(
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
);

const {
getAuth,
signInWithPopup,
OAuthProvider,
signOut,
onAuthStateChanged,
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} = await import(
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
);

const {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
collection,
getDocs,
onSnapshot,
increment
} = await import(
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
);

// FIREBASE CONFIG
const firebaseConfig = {

apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",

authDomain: "ohg-tv.firebaseapp.com",

projectId: "ohg-tv",

storageBucket: "ohg-tv.firebasestorage.app",

messagingSenderId: "700588840705",

appId: "1:700588840705:web:cb7d3f18f8bba3512d2d00"

};

// INIT
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

// ZWEITE FIREBASE-APP-INSTANZ
// (wird benutzt, um im Adminbereich neue Nutzer anzulegen,
// ohne dass dabei die Admin-Sitzung überschrieben/ausgeloggt wird)
const secondaryApp = initializeApp(firebaseConfig, "Secondary");

const secondaryAuth = getAuth(secondaryApp);

// SCHUL-DOMAIN, die für Registrierung/Login erlaubt ist
const ALLOWED_DOMAIN = "@ohgnagold.onmicrosoft.com";

// HILFSFUNKTION: FEHLERTEXT ANZEIGEN
function showAuthError(msg){

    const el = document.getElementById("authError");

    if(el) el.innerText = msg;

}

// USER-EINTRAG ERSTELLEN, FALLS NICHT VORHANDEN
async function ensureUserDoc(user){

    const ref =
    doc(
        db,
        "users",
        user.uid
    );

    const snap =
    await getDoc(ref);

    if(!snap.exists()){

        await setDoc(ref,{

            email:user.email,

            plan:"free",

            role:"user"

        });

    }

}

// MICROSOFT LOGIN
window.microsoftLogin =
async function(){

    showAuthError("");

    const provider =
    new OAuthProvider(
    "microsoft.com"
    );

    // TENANT
    provider.setCustomParameters({

        tenant:
        "6e52e902-bb31-460e-b1b9-5b5bc2272acf"

    });

    try{

        const result =
        await signInWithPopup(
            auth,
            provider
        );

        const user =
        result.user;

        // NUR SCHULMAILS
        if(
            !user.email.endsWith(
            ALLOWED_DOMAIN
            )
        ){

            alert(
            "Nur Schulaccounts erlaubt"
            );

            await signOut(auth);

            return;
        }

        await ensureUserDoc(user);

    }catch(e){

        alert(e.message);

    }

};

// EMAIL/PASSWORT LOGIN
window.emailLogin =
async function(){

    showAuthError("");

    const email =
    document.getElementById(
    "emailInput"
    ).value.trim();

    const password =
    document.getElementById(
    "passwordInput"
    ).value;

    if(!email || !password){

        showAuthError(
        "Bitte E-Mail und Passwort eingeben."
        );

        return;

    }

    try{

        const result =
        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        await ensureUserDoc(
        result.user
        );

    }catch(e){

        showAuthError(
        translateAuthError(e)
        );

    }

};

// FIREBASE FEHLERCODES INS DEUTSCHE ÜBERSETZEN
function translateAuthError(e){

    const code = e.code || "";

    if(code.includes("wrong-password") || code.includes("invalid-credential")){
        return "Falsches Passwort oder E-Mail.";
    }

    if(code.includes("user-not-found")){
        return "Kein Konto mit dieser E-Mail gefunden.";
    }

    if(code.includes("email-already-in-use")){
        return "Diese E-Mail ist bereits registriert.";
    }

    if(code.includes("invalid-email")){
        return "Ungültige E-Mail-Adresse.";
    }

    if(code.includes("weak-password")){
        return "Passwort ist zu schwach (mind. 6 Zeichen).";
    }

    return e.message;

}

// LOGOUT
window.logout =
function(){

    signOut(auth);

};

// STREAM LADEN
function loadStream(url){

    // HLS
    if(
        url.includes(".m3u8")
    ){

        player.innerHTML = `

        <video
        id="video"
        controls
        autoplay
        playsinline>
        </video>

        <script src="
        https://cdn.jsdelivr.net/npm/hls.js@latest
        "><\/script>

        `;

        setTimeout(()=>{

            const video =
            document.getElementById(
            "video"
            );

            if(Hls.isSupported()){

                const hls =
                new Hls();

                hls.loadSource(
                url
                );

                hls.attachMedia(
                video
                );

            }else{

                video.src = url;

            }

        },100);

    }

    // YOUTUBE
    else{

        player.innerHTML = `

        <iframe

        src="${url}"

        allowfullscreen

        style="
        height:500px;
        "

        >

        </iframe>

        `;

    }

}

// USER
async function handleUser(user){

    const ref =
    doc(
        db,
        "users",
        user.uid
    );

    const snap =
    await getDoc(ref);

    const data =
    snap.data();

    // STATUS
    planText.innerText =
    data.plan;

    adminText.innerText =
    data.role === "admin"
    ? "Ja"
    : "Nein";

    logoutBtn.style.display =
    "inline-block";

    // STREAM CONFIG
    const streamRef =
    doc(
        db,
        "config",
        "stream"
    );

    onSnapshot(
    streamRef,
    async (streamSnap)=>{

        const s =
        streamSnap.data();

        // PREMIUM
if(
    data.plan ===
    "premium"
){

    try{

        const idToken =
        await user.getIdToken();

        const response =
        await fetch(
            "https://api.ohg-tv.de/api/token",
            {
                headers:{
                    Authorization:
                    `Bearer ${idToken}`
                }
            }
        );

        if(!response.ok){

            throw new Error(
                "Kein Premium-Zugriff"
            );

        }

        const tokenData =
        await response.json();

        const premiumUrl =
        s.premium +
        "?token=" +
        encodeURIComponent(
            tokenData.token
        );

        loadStream(
            premiumUrl
        );

    }catch(e){

        console.error(e);

        player.innerHTML = `

        <h2>
        🔒 Premium erforderlich
        </h2>

        <p>
        Kein Zugriff auf den Premium-Stream.
        </p>

        `;

    }

}

// FREE
else{

    loadStream(
    s.free
    );

}

    });

    // ADMIN
    if(
        data.role ===
        "admin"
    ){

        admin.style.display =
        "block";

        loadAdmin();

        loadInputs();

    }

}

// ADMIN USERLISTE
async function loadAdmin(){

    const users =
    await getDocs(
        collection(
            db,
            "users"
        )
    );

    userList.innerHTML = "";

    users.forEach((u)=>{

        const d =
        u.data();

        const div =
        document.createElement(
        "div"
        );

        div.className =
        "userCard";

        div.innerHTML = `

        <b>
        ${d.email}
        </b>

        <br>

        Plan:
        ${d.plan}

        <br>

        Rolle:
        ${d.role}

        <br>

        <button
        onclick="
        setPlan(
        '${u.id}',
        'premium'
        )
        ">
        Premium
        </button>

        <button
        onclick="
        setPlan(
        '${u.id}',
        'free'
        )
        ">
        Free
        </button>

        `;

        userList.appendChild(
        div
        );

    });

}

// NEUEN NUTZER ANLEGEN (NUR ADMIN)
window.adminCreateUser =
async function(){

    const statusEl =
    document.getElementById(
    "createUserStatus"
    );

    statusEl.innerText = "";

    const email =
    document.getElementById(
    "newUserEmail"
    ).value.trim();

    const password =
    document.getElementById(
    "newUserPassword"
    ).value;

    const plan =
    document.getElementById(
    "newUserPlan"
    ).value;

    if(!email || !password){

        statusEl.innerText =
        "Bitte E-Mail und Passwort eingeben.";

        return;

    }

    if(password.length < 6){

        statusEl.innerText =
        "Passwort muss mindestens 6 Zeichen lang sein.";

        return;

    }

    try{

        // NUTZER ÜBER ZWEITE APP-INSTANZ ANLEGEN,
        // DAMIT DIE ADMIN-SITZUNG ERHALTEN BLEIBT
        const result =
        await createUserWithEmailAndPassword(
            secondaryAuth,
            email,
            password
        );

        await setDoc(

            doc(
                db,
                "users",
                result.user.uid
            ),

            {

                email:email,

                plan:plan,

                role:"user"

            }

        );

        // AUS DER ZWEITEN APP WIEDER AUSLOGGEN
        await signOut(secondaryAuth);

        document.getElementById(
        "newUserEmail"
        ).value = "";

        document.getElementById(
        "newUserPassword"
        ).value = "";

        statusEl.style.color = "#4ade80";

        statusEl.innerText =
        "Nutzer wurde angelegt.";

        loadAdmin();

    }catch(e){

        statusEl.style.color = "#f87171";

        statusEl.innerText =
        translateAuthError(e);

    }

};

// PLAN ÄNDERN
window.setPlan =
async function(uid,plan){

    await updateDoc(

        doc(
            db,
            "users",
            uid
        ),

        {
            plan
        }

    );

    loadAdmin();

};

// STREAM ÄNDERN
window.updateStream =
async function(){

    await updateDoc(

        doc(
            db,
            "config",
            "stream"
        ),

        {

            free:
            freeStream.value,

            premium:
            premiumStream.value

        }

    );

    alert(
    "Gespeichert"
    );

};

// INPUTS LADEN
async function loadInputs(){

    const ref =
    doc(
        db,
        "config",
        "stream"
    );

    const snap =
    await getDoc(ref);

    // NICHT EXISTIERT
    if(!snap.exists()){

        await setDoc(ref,{

            free:"",
            premium:""

        });

        return;
    }

    const d =
    snap.data();

    freeStream.value =
    d.free || "";

    premiumStream.value =
    d.premium || "";

}

window.openMediathek = function () {
    window.location.href = "/mediathek/";
};

// AUTH
onAuthStateChanged(
auth,
(user)=>{

    // NICHT EINGELOGGT
    if(!user){

        player.innerHTML = `

        <div id="loginRequired">

        <h2>
        🔒 Login erforderlich
        </h2>

        <p>
        Bitte mit dem Schul-Microsoftkonto oder per E-Mail anmelden.
        </p>

        <button onclick="
        microsoftLogin()
        ">
        Mit Microsoft anmelden
        </button>

        <div class="divider">— oder —</div>

        <input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
        <input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">

        <button onclick="emailLogin()">
        Mit E-Mail anmelden
        </button>

        <div id="authError" class="error"></div>

        </div>

        `;

        planText.innerText = "-";
        adminText.innerText = "-";

        admin.style.display = "none";

        logoutBtn.style.display = "none";

        return;
    }

    // USER
    handleUser(user);

});

}catch(e){

    // WIRD AUSGELÖST, WENN Z.B. DIE FIREBASE-SCRIPTE
    // NICHT GELADEN WERDEN KONNTEN (NETZWERK/CORS)
    // ODER DIE INITIALISIERUNG FEHLSCHLÄGT.
    // OHNE DIESEN FANG BRECHEN SONST ALLE onclick-HANDLER
    // MIT KRYPTISCHEN "ReferenceError: xyz is not defined" AB.

    console.error("OHG-TV Ladefehler:", e);

    const loginBox =
    document.getElementById(
    "loginRequired"
    );

    if(loginBox){

        loginBox.innerHTML = `

        <h2>⚠️ Fehler beim Laden</h2>

        <p>
        Die Seite konnte nicht vollständig geladen werden.
        bitte Kontaktieren sie support@ohg-tv.de.
        </p>

        <p style="opacity:0.7;font-size:0.9em;">
        ${e.message || e}
        </p>

        `;

    }

}

})();

</script>

</body>
</html>
