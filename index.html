<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OHG-TV</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

#app{
    max-width:1000px;
    margin:auto;
    padding:15px;
}

h1{
    margin-top:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:16px;
    padding:15px;
    margin-top:15px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    box-sizing:border-box;
}

iframe,
video{
    width:100%;
    border:none;
    border-radius:18px;
    background:black;
}

#status{
    margin-top:10px;
    opacity:0.8;
}

#loginRequired{
    margin-top:20px;
}

#viewer{
    margin-top:10px;
}

.divider{
    margin:20px 0;
    opacity:0.6;
}

.error{
    color:#f87171;
    margin-top:10px;
}

.linkBtn{
    background:none;
    color:#93c5fd;
    text-decoration:underline;
    padding:5px;
}

footer{
    margin-top:40px;
    padding:20px;
    opacity:0.7;
}

</style>

</head>

<body>

<div id="app">

<h1>📺 OHG-TV</h1>

<p>
Schulfernsehen • Live • 24/7
</p>

<!-- PLAYER -->
<div class="card">

<div id="player">

<div id="loginRequired">

<h2>
🔒 Login erforderlich
</h2>

<p>
Bitte mit dem Schul-Microsoftkonto oder per E-Mail anmelden.
</p>

<button onclick="microsoftLogin()">
Mit Microsoft anmelden
</button>

<div class="divider">— oder —</div>

<input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
<input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">

<button onclick="emailLogin()">
Mit E-Mail anmelden
</button>

<div id="authError" class="error"></div>

</div>

</div>

<div id="viewer">
👀 Zuschauer: 0
</div>

</div>

<!-- STATUS -->
<div class="card">

<div id="status">

<p>
💳 Plan:
<span id="planText">
-
</span>
</p>

<p>
👨‍💼 Admin:
<span id="adminText">
-
</span>
</p>

</div>

<button
id="logoutBtn"
style="display:none;"
onclick="logout()"
>
Logout
</button>

</div>

<footer>
OHG-TV
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script type="module">

(async () => {

try{

// FIREBASE IMPORTS
const {
initializeApp
} = await import(
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
);

const {
getAuth,
signInWithPopup,
OAuthProvider,
signOut,
onAuthStateChanged,
signInWithEmailAndPassword
} = await import(
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
);

const {
getFirestore,
doc,
getDoc,
setDoc,
onSnapshot
} = await import(
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
);

// FIREBASE CONFIG
const firebaseConfig = {

apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",

authDomain: "ohg-tv.firebaseapp.com",

projectId: "ohg-tv",

storageBucket: "ohg-tv.firebasestorage.app",

messagingSenderId: "700588840705",

appId: "1:700588840705:web:cb7d3f18f8bba3512d2d00"

};

// INIT
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

// SCHUL-DOMAIN, die für den Microsoft-Login erlaubt ist
const ALLOWED_DOMAIN = "@ohgnagold.onmicrosoft.com";

// HILFSFUNKTION: FEHLERTEXT ANZEIGEN
function showAuthError(msg){

    const el = document.getElementById("authError");

    if(el) el.innerText = msg;

}

// USER-EINTRAG ERSTELLEN, FALLS NICHT VORHANDEN
async function ensureUserDoc(user){

    const ref =
    doc(
        db,
        "users",
        user.uid
    );

    const snap =
    await getDoc(ref);

    if(!snap.exists()){

        await setDoc(ref,{

            email:user.email,

            plan:"free",

            role:"user"

        });

    }

}

// MICROSOFT LOGIN
window.microsoftLogin =
async function(){

    showAuthError("");

    const provider =
    new OAuthProvider(
    "microsoft.com"
    );

    // TENANT
    provider.setCustomParameters({

        tenant:
        "6e52e902-bb31-460e-b1b9-5b5bc2272acf"

    });

    try{

        const result =
        await signInWithPopup(
            auth,
            provider
        );

        const user =
        result.user;

        // NUR SCHULMAILS
        if(
            !user.email.endsWith(
            ALLOWED_DOMAIN
            )
        ){

            alert(
            "Nur Schulaccounts erlaubt"
            );

            await signOut(auth);

            return;
        }

        await ensureUserDoc(user);

    }catch(e){

        alert(e.message);

    }

};

// EMAIL/PASSWORT LOGIN
window.emailLogin =
async function(){

    showAuthError("");

    const email =
    document.getElementById(
    "emailInput"
    ).value.trim();

    const password =
    document.getElementById(
    "passwordInput"
    ).value;

    if(!email || !password){

        showAuthError(
        "Bitte E-Mail und Passwort eingeben."
        );

        return;

    }

    try{

        const result =
        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        await ensureUserDoc(
        result.user
        );

    }catch(e){

        showAuthError(
        translateAuthError(e)
        );

    }

};

// FIREBASE FEHLERCODES INS DEUTSCHE ÜBERSETZEN
function translateAuthError(e){

    const code = e.code || "";

    if(code.includes("wrong-password") || code.includes("invalid-credential")){
        return "Falsches Passwort oder E-Mail.";
    }

    if(code.includes("user-not-found")){
        return "Kein Konto mit dieser E-Mail gefunden.";
    }

    if(code.includes("invalid-email")){
        return "Ungültige E-Mail-Adresse.";
    }

    return e.message;

}

// LOGOUT
window.logout =
function(){

    signOut(auth);

};

// STREAM LADEN
function loadStream(url){

    // HLS
    if(
        url.includes(".m3u8")
    ){

        player.innerHTML = `

        <video
        id="video"
        controls
        autoplay
        playsinline>
        </video>

        <script src="
        https://cdn.jsdelivr.net/npm/hls.js@latest
        "><\/script>

        `;

        setTimeout(()=>{

            const video =
            document.getElementById(
            "video"
            );

            if(Hls.isSupported()){

                const hls =
                new Hls();

                hls.loadSource(
                url
                );

                hls.attachMedia(
                video
                );

            }else{

                video.src = url;

            }

        },100);

    }

    // YOUTUBE
    else{

        player.innerHTML = `

        <iframe

        src="${url}"

        allowfullscreen

        style="
        height:500px;
        "

        >

        </iframe>

        `;

    }

}

// USER
async function handleUser(user){

    const ref =
    doc(
        db,
        "users",
        user.uid
    );

    const snap =
    await getDoc(ref);

    const data =
    snap.data();

    // STATUS
    planText.innerText =
    data.plan;

    adminText.innerText =
    data.role === "admin"
    ? "Ja"
    : "Nein";

    logoutBtn.style.display =
    "inline-block";

    // STREAM CONFIG
    const streamRef =
    doc(
        db,
        "config",
        "stream"
    );

    onSnapshot(
    streamRef,
    async (streamSnap)=>{

        const s =
        streamSnap.data();

        // PREMIUM
if(
    data.plan ===
    "premium"
){

    try{

        const idToken =
        await user.getIdToken();

        const response =
        await fetch(
            "https://api.ohg-tv.de/api/token",
            {
                headers:{
                    Authorization:
                    `Bearer ${idToken}`
                }
            }
        );

        if(!response.ok){

            throw new Error(
                "Kein Premium-Zugriff"
            );

        }

        const tokenData =
        await response.json();

        const premiumUrl =
        s.premium +
        "?token=" +
        encodeURIComponent(
            tokenData.token
        );

        loadStream(
            premiumUrl
        );

    }catch(e){

        console.error(e);

        player.innerHTML = `

        <h2>
        🔒 Premium erforderlich
        </h2>

        <p>
        Kein Zugriff auf den Premium-Stream.
        </p>

        `;

    }

}

// FREE
else{

    loadStream(
    s.free
    );

}

    });

}

// AUTH
onAuthStateChanged(
auth,
(user)=>{

    // NICHT EINGELOGGT
    if(!user){

        player.innerHTML = `

        <div id="loginRequired">

        <h2>
        🔒 Login erforderlich
        </h2>

        <p>
        Bitte mit dem Schul-Microsoftkonto oder per E-Mail anmelden.
        </p>

        <button onclick="
        microsoftLogin()
        ">
        Mit Microsoft anmelden
        </button>

        <div class="divider">— oder —</div>

        <input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
        <input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">

        <button onclick="emailLogin()">
        Mit E-Mail anmelden
        </button>

        <div id="authError" class="error"></div>

        </div>

        `;

        planText.innerText = "-";
        adminText.innerText = "-";

        logoutBtn.style.display = "none";

        return;
    }

    // USER
    handleUser(user);

});

}catch(e){

    console.error("OHG-TV Ladefehler:", e);

    const loginBox =
    document.getElementById(
    "loginRequired"
    );

    if(loginBox){

        loginBox.innerHTML = `

        <h2>⚠️ Fehler beim Laden</h2>

        <p>
        Die Seite konnte nicht vollständig geladen werden.
        Bitte kontaktieren sie support@ohg-tv.de.
        </p>

        <p style="opacity:0.7;font-size:0.9em;">
        ${e.message || e}
        </p>

        `;

    }

}

})();

</script>

</body>
</html>
