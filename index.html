<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHG-TV</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
#app{max-width:1000px;margin:auto;padding:15px;}
h1{margin-top:20px;}
.card{background:rgba(255,255,255,0.05);border-radius:16px;padding:15px;margin-top:15px;}
button{background:#2563eb;color:white;border:none;border-radius:12px;padding:12px 20px;cursor:pointer;margin-top:10px;}
button:hover{opacity:0.9;}
input{width:100%;padding:12px;border:none;border-radius:12px;margin-top:10px;box-sizing:border-box;background:rgba(255,255,255,0.1);color:white;}
input::placeholder {color: rgba(255, 255, 255, 0.5);}
iframe,video{width:100%;border:none;border-radius:18px;background:black;height:450px;}
#status{margin-top:10px;opacity:0.8;}
#loginRequired{margin-top:20px;padding: 20px;}
#viewer{margin-top:10px;}
.divider{margin:20px 0;opacity:0.6;}
.error{color:#f87171;margin-top:10px;}
.success{color:#4ade80;margin-top:10px;}
footer{margin-top:40px;padding:20px;opacity:0.7;}
</style>
</head>
<body>

<div id="app">
<h1>📺 OHG-TV</h1>
<p>Schulfernsehen • Live • 24/7</p>

<div class="card">
<div id="player">
<div id="loginRequired">
<h2>🔒 Login erforderlich</h2>
<p>Bitte mit dem Schul-Microsoftkonto oder per E-Mail anmelden.</p>
<button onclick="microsoftLogin()">Mit Microsoft anmelden</button>
<div class="divider">— oder —</div>
<input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
<input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">
<button onclick="emailLogin()">Mit E-Mail anmelden</button>
<div id="authError" class="error"></div>
</div>
</div>
<div id="viewer">👀 Zuschauer: 0</div>
</div>

<div class="card" id="activationCard" style="display:none;">
<h3>🔑 Premium-Code aktivieren</h3>
<p>Gib deinen Zugangscode ein, um Premium-Zugriff freizuschalten.</p>
<input id="activationCodeInput" type="text" placeholder="OHG-XXXX-XXXX">
<button onclick="activateCode()">Code einlösen</button>
<div id="activationStatus" class="error"></div>
</div>

<div class="card">
<div id="status">
<p>💳 Plan: <span id="planText">-</span></p>
<p>👨‍💼 Rolle: <span id="roleText">-</span></p>
</div>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<footer>OHG-TV</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script type="module">
(async () => {
try{
const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
const { getAuth, signInWithPopup, OAuthProvider, signOut, onAuthStateChanged, signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
const { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

const firebaseConfig = {
    apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",
    authDomain: "ohg-tv.firebaseapp.com",
    projectId: "ohg-tv",
    storageBucket: "ohg-tv.firebasestorage.app",
    messagingSenderId: "700588840705",
    appId: "1:700588840705:web:cb7d3f18f8bba3512d2d00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ALLOWED_DOMAIN = "@ohgnagold.onmicrosoft.com";
let activeCheckInterval = null;

function showAuthError(msg){
    const el = document.getElementById("authError");
    if(el) el.innerText = msg;
}

async function ensureUserDoc(user){
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    if(!snap.exists()){
        await setDoc(ref,{
            email: user.email,
            plan: "free",
            role: "user",
            activeCode: null
        });
    }
}

window.microsoftLogin = async function(){
    showAuthError("");
    const provider = new OAuthProvider("microsoft.com");
    provider.setCustomParameters({ tenant: "6e52e902-bb31-460e-b1b9-5b5bc2272acf" });
    try{
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        if(!user.email.endsWith(ALLOWED_DOMAIN)){
            alert("Nur Schulaccounts erlaubt");
            await signOut(auth);
            return;
        }
        await ensureUserDoc(user);
    }catch(e){
        alert(e.message);
    }
};

window.emailLogin = async function(){
    showAuthError("");
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    if(!email || !password){
        showAuthError("Bitte E-Mail und Passwort eingeben.");
        return;
    }
    try{
        const result = await signInWithEmailAndPassword(auth, email, password);
        await ensureUserDoc(result.user);
    }catch(e){
        showAuthError(translateAuthError(e));
    }
};

function translateAuthError(e){
    const code = e.code || "";
    if(code.includes("wrong-password") || code.includes("invalid-credential")) return "Falsches Passwort oder E-Mail.";
    if(code.includes("user-not-found")) return "Kein Konto mit dieser E-Mail gefunden.";
    if(code.includes("invalid-email")) return "Ungültige E-Mail-Adresse.";
    return e.message;
}

window.logout = function(){
    if (activeCheckInterval) clearInterval(activeCheckInterval);
    signOut(auth);
};

function loadStream(url){
    const playerDiv = document.getElementById("player");
    if(!playerDiv) return;

    if(url.includes(".m3u8")){
        playerDiv.innerHTML = `<video id="video" controls autoplay playsinline></video>`;
        setTimeout(()=>{
            const video = document.getElementById("video");
            if(!video) return;
            if(Hls.isSupported()){
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            }else{
                video.src = url;
            }
        },100);
    }else{
        playerDiv.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
    }
}

async function handleUser(user){
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    const data = snap.exists() ? snap.data() : { plan: "free", role: "user", activeCode: null };

    if (activeCheckInterval) clearInterval(activeCheckInterval);

    // Wer darf Premium sehen? (Premium-Plan ODER Mitarbeiter ODER Techniker ODER Owner)
    const hatPremiumRechte = data.plan === "premium" || ["mitarbeiter", "techniker", "owner"].includes(data.role);

    // ECHTZEIT-ABLAUFPRÜFUNG (nur für normale Premium-Zahler mit Code nötig)
    if (data.plan === "premium" && data.activeCode && !["mitarbeiter", "techniker", "owner"].includes(data.role)) {
        activeCheckInterval = setInterval(async () => {
            const currentSnap = await getDoc(ref);
            if (!currentSnap.exists()) return;
            const currentUserData = currentSnap.data();
            
            if (currentUserData.plan !== "premium") {
                clearInterval(activeCheckInterval);
                alert("Dein Premium-Zugang ist abgelaufen.");
                location.reload();
                return;
            }

            const codeRef = doc(db, "activation_codes", currentUserData.activeCode);
            const codeSnap = await getDoc(codeRef);

            if (codeSnap.exists()) {
                const codeData = codeSnap.data();
                if (codeData.expiresAt && new Date() > codeData.expiresAt.toDate()) {
                    clearInterval(activeCheckInterval);
                    await updateDoc(ref, { plan: "free", activeCode: null });
                    await deleteDoc(codeRef);
                    alert("Dein Premium-Zugang ist abgelaufen.");
                    location.reload();
                }
            } else {
                clearInterval(activeCheckInterval);
                await updateDoc(ref, { plan: "free", activeCode: null });
                alert("Dein Premium-Zugang ist abgelaufen.");
                location.reload();
            }
        }, 10000); 
    }

    planText.innerText = data.plan;
    roleText.innerText = data.role.toUpperCase();
    logoutBtn.style.display = "inline-block";

    // KORREKTUR: Aktivierungsfeld für alle echten Free-User ohne Sonderrolle einblenden!
    const actCard = document.getElementById("activationCard");
    if (data.plan === "free" && !["mitarbeiter", "techniker", "owner"].includes(data.role)) {
        actCard.style.display = "block";
    } else {
        actCard.style.display = "none";
    }

    // STREAM CONFIG LADEN
    const streamRef = doc(db, "config", "stream");
    onSnapshot(streamRef, async (streamSnap)=>{
        if(!streamSnap.exists()) return;
        const s = streamSnap.data();
        
        if(hatPremiumRechte){
            try{
                const idToken = await user.getIdToken();
                const response = await fetch("https://api.ohg-tv.de/api/token", {
                    headers: { Authorization: `Bearer ${idToken}` }
                });
                if(!response.ok) throw new Error("Kein Premium-Zugriff");
                const tokenData = await response.json();
                const premiumUrl = s.premium + "?token=" + encodeURIComponent(tokenData.token);
                loadStream(premiumUrl);
            }catch(e){
                console.error("Premium-Token-Fehler, weiche auf Free-Stream aus:", e);
                loadStream(s.free); // Fallback auf Free falls die Token-API offline ist
            }
        }else{
            // Wenn der User kein Premium hat, wird sofort der Free-Stream geladen
            loadStream(s.free);
        }
    });
}

window.activateCode = async function() {
    const statusEl = document.getElementById("activationStatus");
    statusEl.innerText = "";
    statusEl.className = "error";
    const codeInput = document.getElementById("activationCodeInput").value.trim().toUpperCase();
    if (!codeInput) { statusEl.innerText = "Bitte einen Code eingeben."; return; }

    try {
        const codeRef = doc(db, "activation_codes", codeInput);
        const codeSnap = await getDoc(codeRef);
        if (!codeSnap.exists()) { statusEl.innerText = "Dieser Code existiert nicht."; return; }
        const codeData = codeSnap.data();
        const now = new Date();

        if (codeData.expiresAt) {
            const expirationDate = codeData.expiresAt.toDate();
            if (now > expirationDate) {
                await deleteDoc(codeRef);
                statusEl.innerText = "Dieser Code ist abgelaufen.";
                return;
            }
            await upgradeUserToPremium(codeInput);
            return;
        }

        const durationMs = codeData.durationMinutes * 60 * 1000;
        const expireTime = new Date(now.getTime() + durationMs);
        await updateDoc(codeRef, { activatedAt: now, expiresAt: expireTime, usedBy: auth.currentUser.uid });
        await upgradeUserToPremium(codeInput);
    } catch (e) {
        statusEl.innerText = "Fehler beim Einlösen: " + e.message;
    }
};

async function upgradeUserToPremium(codeText) {
    const userRef = doc(db, "users", auth.currentUser.uid);
    await updateDoc(userRef, { plan: "premium", activeCode: codeText });
    const statusEl = document.getElementById("activationStatus");
    statusEl.className = "success";
    statusEl.innerText = "Premium erfolgreich freigeschaltet! Lade neu...";
    setTimeout(() => { location.reload(); }, 1500);
}

onAuthStateChanged(auth, (user)=>{
    if(!user){
        const playerDiv = document.getElementById("player");
        if(playerDiv) {
            playerDiv.innerHTML = `
            <div id="loginRequired">
            <h2>🔒 Login erforderlich</h2>
            <p>Bitte mit dem Schul-Microsoftkonto oder per E-Mail anmelden.</p>
            <button onclick="microsoftLogin()">Mit Microsoft anmelden</button>
            <div class="divider">— oder —</div>
            <input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
            <input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">
            <button onclick="emailLogin()">Mit E-Mail anmelden</button>
            <div id="authError" class="error"></div>
            </div>
            `;
        }
        planText.innerText = "-";
        roleText.innerText = "-";
        logoutBtn.style.display = "none";
        document.getElementById("activationCard").style.display = "none";
        if (activeCheckInterval) clearInterval(activeCheckInterval);
        return;
    }
    handleUser(user);
});
}catch(e){
    console.error("OHG-TV Ladefehler:", e);
}
})();
</script>
</body>
</html>
