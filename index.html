<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OHG-TV</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

#app{
    max-width:1000px;
    margin:auto;
    padding:15px;
}

h1{
    margin-top:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:16px;
    padding:15px;
    margin-top:15px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
}

iframe,
video{
    width:100%;
    border:none;
    border-radius:18px;
    background:black;
}

#admin{
    display:none;
}

#status{
    margin-top:10px;
    opacity:0.8;
}

#loginRequired{
    margin-top:20px;
}

#viewer{
    margin-top:10px;
}

.userCard{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:12px;
    margin-top:10px;
}

footer{
    margin-top:40px;
    padding:20px;
    opacity:0.7;
}

</style>

</head>

<body>

<div id="app">

<h1>📺 OHG-TV</h1>

<p>
Schulfernsehen • Live • 24/7
</p>

<!-- PLAYER -->
<div class="card">

<div id="player">

<div id="loginRequired">

<h2>
🔒 Login erforderlich
</h2>

<p>
Bitte mit dem Schul-Microsoftkonto anmelden.
</p>

<button onclick="microsoftLogin()">
Mit Microsoft anmelden
</button>

</div>

</div>

<div id="viewer">
👀 Zuschauer: 0
</div>

</div>

<!-- STATUS -->
<div class="card">

<div id="status">

<p>
💳 Plan:
<span id="planText">
-
</span>
</p>

<p>
👨‍💼 Admin:
<span id="adminText">
-
</span>
</p>

</div>

<button
id="logoutBtn"
style="display:none;"
onclick="logout()"
>
Logout
</button>

</div>

<!-- ADMIN -->
<div id="admin" class="card">

<h2>
👨‍💼 Adminpanel
</h2>

<h3>
🎥 Streams
</h3>

<input
id="freeStream"
placeholder="Free Stream URL"
>

<input
id="premiumStream"
placeholder="Premium Stream URL"
>

<button onclick="updateStream()">
Speichern
</button>

<h3>
👥 Benutzer
</h3>

<div id="userList"></div>

</div>

<footer>
OHG-TV
</footer>

</div>

<script type="module">

// FIREBASE IMPORTS
import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithPopup,
OAuthProvider,
signOut,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
collection,
getDocs,
onSnapshot,
increment
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {

apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",

authDomain: "ohg-tv.firebaseapp.com",

projectId: "ohg-tv",

storageBucket: "ohg-tv.firebasestorage.app",

messagingSenderId: "700588840705",

appId: "1:700588840705:web:cb7d3f18f8bba3512d2d00"

};

// INIT
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

// MICROSOFT LOGIN
window.microsoftLogin =
async function(){

    const provider =
    new OAuthProvider(
    "microsoft.com"
    );

    // TENANT
    provider.setCustomParameters({

        tenant:
        "6e52e902-bb31-460e-b1b9-5b5bc2272acf"

    });

    try{

        const result =
        await signInWithPopup(
            auth,
            provider
        );

        const user =
        result.user;

        // NUR SCHULMAILS
        if(
            !user.email.endsWith(
            "@ohgnagold.onmicrosoft.com"
            )
        ){

            alert(
            "Nur Schulaccounts erlaubt"
            );

            await signOut(auth);

            return;
        }

        // USER DB
        const ref =
        doc(
            db,
            "users",
            user.uid
        );

        const snap =
        await getDoc(ref);

        // USER ERSTELLEN
        if(!snap.exists()){

            await setDoc(ref,{

                email:user.email,

                plan:"free",

                role:"user"

            });

        }

    }catch(e){

        alert(e.message);

    }

};

// LOGOUT
window.logout =
function(){

    signOut(auth);

};

// STREAM LADEN
function loadStream(url){

    // HLS
    if(
        url.includes(".m3u8")
    ){

        player.innerHTML = `

        <video
        id="video"
        controls
        autoplay
        playsinline>
        </video>

        <script src="
        https://cdn.jsdelivr.net/npm/hls.js@latest
        "><\/script>

        `;

        setTimeout(()=>{

            const video =
            document.getElementById(
            "video"
            );

            if(Hls.isSupported()){

                const hls =
                new Hls();

                hls.loadSource(
                url
                );

                hls.attachMedia(
                video
                );

            }else{

                video.src = url;

            }

        },100);

    }

    // YOUTUBE
    else{

        player.innerHTML = `

        <iframe

        src="${url}"

        allowfullscreen

        style="
        height:500px;
        "

        >

        </iframe>

        `;

    }

}

// USER
async function handleUser(user){

    const ref =
    doc(
        db,
        "users",
        user.uid
    );

    const snap =
    await getDoc(ref);

    const data =
    snap.data();

    // STATUS
    planText.innerText =
    data.plan;

    adminText.innerText =
    data.role === "admin"
    ? "Ja"
    : "Nein";

    logoutBtn.style.display =
    "inline-block";

    // STREAM CONFIG
    const streamRef =
    doc(
        db,
        "config",
        "stream"
    );

    onSnapshot(
    streamRef,
    (streamSnap)=>{

        const s =
        streamSnap.data();

        // PREMIUM
        if(
            data.plan ===
            "premium"
        ){

            loadStream(
            s.premium
            );

        }

        // FREE
        else{

            loadStream(
            s.free
            );

        }

    });

    // ADMIN
    if(
        data.role ===
        "admin"
    ){

        admin.style.display =
        "block";

        loadAdmin();

        loadInputs();

    }

}

// ADMIN USERLISTE
async function loadAdmin(){

    const users =
    await getDocs(
        collection(
            db,
            "users"
        )
    );

    userList.innerHTML = "";

    users.forEach((u)=>{

        const d =
        u.data();

        const div =
        document.createElement(
        "div"
        );

        div.className =
        "userCard";

        div.innerHTML = `

        <b>
        ${d.email}
        </b>

        <br>

        Plan:
        ${d.plan}

        <br>

        Rolle:
        ${d.role}

        <br>

        <button
        onclick="
        setPlan(
        '${u.id}',
        'premium'
        )
        ">
        Premium
        </button>

        <button
        onclick="
        setPlan(
        '${u.id}',
        'free'
        )
        ">
        Free
        </button>

        `;

        userList.appendChild(
        div
        );

    });

}

// PLAN ÄNDERN
window.setPlan =
async function(uid,plan){

    await updateDoc(

        doc(
            db,
            "users",
            uid
        ),

        {
            plan
        }

    );

    loadAdmin();

};

// STREAM ÄNDERN
window.updateStream =
async function(){

    await updateDoc(

        doc(
            db,
            "config",
            "stream"
        ),

        {

            free:
            freeStream.value,

            premium:
            premiumStream.value

        }

    );

    alert(
    "Gespeichert"
    );

};

// INPUTS LADEN
async function loadInputs(){

    const ref =
    doc(
        db,
        "config",
        "stream"
    );

    const snap =
    await getDoc(ref);

    // NICHT EXISTIERT
    if(!snap.exists()){

        await setDoc(ref,{

            free:"",
            premium:""

        });

        return;
    }

    const d =
    snap.data();

    freeStream.value =
    d.free || "";

    premiumStream.value =
    d.premium || "";

}

// AUTH
onAuthStateChanged(
auth,
(user)=>{

    // NICHT EINGELOGGT
    if(!user){

        player.innerHTML = `

        <div id="loginRequired">

        <h2>
        🔒 Login erforderlich
        </h2>

        <p>
        Bitte mit dem Schul-Microsoftkonto anmelden.
        </p>

        <button onclick="
        microsoftLogin()
        ">
        Mit Microsoft anmelden
        </button>

        </div>

        `;

        planText.innerText = "-";
        adminText.innerText = "-";

        admin.style.display = "none";

        logoutBtn.style.display = "none";

        return;
    }

    // USER
    handleUser(user);

});

</script>

</body>
</html>
