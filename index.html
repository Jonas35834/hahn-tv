<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hahn.tv</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

#app { display: none; }

#player {
    margin-top: 20px;
}

#status {
    margin-top: 10px;
    color: #22c55e;
}
</style>
</head>

<body>

<h1>📺 Hahn.tv</h1>

<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>
    <input id="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">
    <br>
    <button onclick="register()">Registrieren</button>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
    <h2>Live Stream</h2>

    <div id="player">
        <iframe width="560" height="315"
        src="https://www.youtube.com/embed/cs5-xmsx_Y8"
        frameborder="0" allowfullscreen></iframe>
    </div>

    <div id="status">✔ Eingeloggt</div>

    <br>
    <button onclick="logout()">Logout</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG EINSETZEN */
 const firebaseConfig = {

    apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",

    authDomain: "ohg-tv.firebaseapp.com",

    projectId: "ohg-tv",

    storageBucket: "ohg-tv.firebasestorage.app",

    messagingSenderId: "700588840705",

    appId: "1:700588840705:web:cb7d3f18f8bba3512d2d00"

  };



const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* DEVICE ID */
function getDeviceId() {
    let id = localStorage.getItem("deviceId");

    if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("deviceId", id);
    }

    return id;
}

/* REGISTER */
window.register = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Registriert!"))
    .catch(err => alert(err.message));
};

/* LOGIN */
window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .catch(err => alert(err.message));
};

/* LOGOUT */
window.logout = function() {
    signOut(auth);
};

/* SESSION CONTROL */
async function handleSession(user) {
    const deviceId = getDeviceId();
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        await setDoc(ref, {
            email: user.email,
            activeDevice: deviceId
        });
    } else {
        const data = snap.data();

        // 👉 neue Session überschreibt alte (Kick)
        await setDoc(ref, {
            email: user.email,
            activeDevice: deviceId
        });
    }

    // Realtime Kick wenn anderes Gerät einloggt
    onSnapshot(ref, (docSnap) => {
        const data = docSnap.data();

        if (data.activeDevice !== getDeviceId()) {
            alert("❌ Du wurdest ausgeloggt (anderes Gerät aktiv)");
            signOut(auth);
        }
    });
}

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";

        handleSession(user);
    } else {
        document.getElementById("login").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});
</script>

</body>
</html>
