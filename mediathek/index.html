<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHG-TV Mediathek</title>

<button onclick="goBack()" style="margin-bottom:15px;">
⬅️ Zurück zur Hauptseite
</button>
    
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.app {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.video {
    padding: 12px;
    margin: 10px 0;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.video:hover {
    background: rgba(255,255,255,0.15);
}

video {
    width: 100%;
    margin-top: 20px;
    border-radius: 10px;
    background: black;
}

.upload {
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    margin-top: 20px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.deleteBtn {
    width: auto;
    padding: 6px 10px;
    background: red;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="app">

<h1>🎬 Mediathek</h1>

<div id="videos">Lade...</div>

<video id="player" controls></video>

</div>

<div class="upload">
<h2>📤 Upload</h2>

<input type="text" id="title" placeholder="Titel">
<input type="file" id="file">

<button onclick="uploadVideo()">Upload starten</button>

<p id="status"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",
    authDomain: "ohg-tv.firebaseapp.com",
    projectId: "ohg-tv"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

// ---------------- LOAD VIDEOS ----------------
async function loadVideos(user) {

    const token = await user.getIdToken();

    const res = await fetch("https://api.ohg-tv.de/api/videos", {
        headers: {
            Authorization: "Bearer " + token
        }
    });

    const videos = await res.json();

    const div = document.getElementById("videos");
    div.innerHTML = "";

    videos.forEach(v => {

        const el = document.createElement("div");
        el.className = "video";

        el.innerHTML = `
            <span>🎥 ${v.title}</span>
        `;

        el.onclick = () => {
            document.getElementById("player").src = v.url;
        };

        div.appendChild(el);
    });
}

// ---------------- UPLOAD ----------------
window.uploadVideo = async function () {

    const user = auth.currentUser;
    if (!user) {
        alert("Nicht eingeloggt");
        return;
    }

    const file = document.getElementById("file").files[0];
    const title = document.getElementById("title").value;
    const status = document.getElementById("status");

    if (!file) {
        alert("Keine Datei ausgewählt");
        return;
    }

    status.innerText = "⏳ Upload läuft...";

    const token = await user.getIdToken();

    const formData = new FormData();
    formData.append("video", file);
    formData.append("title", title);

    const res = await fetch("https://api.ohg-tv.de/api/upload", {
        method: "POST",
        headers: {
            Authorization: "Bearer " + token
        },
        body: formData
    });

    const data = await res.json();

    if (data.error) {
        status.innerText = "❌ " + data.error;
    } else {
        status.innerText = "✅ Upload erfolgreich!";
        loadVideos(user);
    }
};

window.goBack = function () {
    window.location.href = "/";
};
    
// ---------------- AUTH ----------------
onAuthStateChanged(auth, (user) => {

    if (!user) {
        document.getElementById("videos").innerHTML = "Bitte einloggen";
        return;
    }

    currentUser = user;
    loadVideos(user);
});

</script>

</body>
</html>
