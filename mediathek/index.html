<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediathek</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.app {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.video {
    padding: 12px;
    margin: 10px 0;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
}

video {
    width: 100%;
    margin-top: 20px;
    border-radius: 10px;
}

.upload {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
</style>
</head>

<body>

<div class="app">

<h1>🎬 Mediathek</h1>

<div id="videos">Lade...</div>

<video id="player" controls></video>

</div>

<div class="upload">
  <h2>📤 Upload</h2>

<input type="text" id="title" placeholder="Titel"><br><br>
<input type="file" id="file"><br><br>

<button id="uploadBtn">Upload starten</button>

<p id="status"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAAde58cIPBK-Ux4JL4OhUoEABKsWD6WiE",
    authDomain: "ohg-tv.firebaseapp.com",
    projectId: "ohg-tv"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

async function loadVideos(user) {

    const token = await user.getIdToken();

    const res = await fetch("https://api.ohg-tv.de/api/videos", {
        headers: {
            Authorization: "Bearer " + token
        }
    });

    const videos = await res.json();

    const div = document.getElementById("videos");
    div.innerHTML = "";

    videos.forEach(v => {

        const el = document.createElement("div");
        el.className = "video";
        el.innerText = v.title;

        el.onclick = () => {
            document.getElementById("player").src = v.url;
        };

        div.appendChild(el);

    });

}

window.uploadVideo = async function () {

    const user = auth.currentUser;
    if (!user) {
        alert("Nicht eingeloggt");
        return;
    }

    const file = document.getElementById("file").files[0];
    const title = document.getElementById("title").value;
    const status = document.getElementById("status");

    if (!file) {
        alert("Keine Datei ausgewählt");
        return;
    }

    status.innerText = "⏳ Upload läuft...";

    const token = await user.getIdToken();

    const formData = new FormData();
    formData.append("video", file);
    formData.append("title", title);

    const res = await fetch("https://api.ohg-tv.de/api/upload", {
        method: "POST",
        headers: {
            Authorization: "Bearer " + token
        },
        body: formData
    });

    const data = await res.json();

    if (data.error) {
        status.innerText = "❌ " + data.error;
        console.error(data);
    } else {
        status.innerText = "✅ Upload erfolgreich!";
        console.log(data);

        // reload videos
        loadVideos(user);
    }
};

document.getElementById("uploadBtn").addEventListener("click", uploadVideo);

onAuthStateChanged(auth, (user) => {
    if (user) loadVideos(user);
});

</script>

</body>
</html>
